{% extends "base.html" %}

{% block title %}Home - Ines QA Platform{% endblock %}

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de cas de test Xray</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='script/script.js') }}"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧪 Générateur test cas Xray</h1>
        <p class="subtitle">Créez facilement vos cas de test</p>
    </div>

    <form method="POST" id="testForm">
        <div class="form-group">
            <label><span class="icon">🔑</span>Clé Requirement (ex: W250-6073):</label>
            <input type="text" name="req" required placeholder="W250-6073">
        </div>

        <div class="form-group">
            <label><span class="icon">👤</span>Nom d'utilisateur Jira:</label>
            <input type="email" value="mootaz.benabdallah@saphirconsult.com" name="username" required>
        </div>

        <div class="form-group">
            <label><span class="icon">🌐</span>URL Jira:</label>
            <input type="text" value="https://qualiproapp.atlassian.net" name="baseurl" required>
        </div>

        <div class="form-group">
            <label><span class="icon">📂</span>Clé du projet:</label>
            <input type="text" value="CDT" name="project_key" required>
        </div>

        <div class="form-group">
            <label><span class="icon">📋</span>Nom de la version:</label>
            <input type="text" value="w2523" name="version_name" required>
        </div>

        <div class="form-group">
            <label><span class="icon">📁</span>Chemin du dossier Xray:</label>
            <input type="text" name="folder_path" required placeholder="/chemin/vers/dossier">
        </div>

        <div class="form-group">
            <label><span class="icon">🔢</span>Nombre de cas de test à générer:</label>
            <input type="number" name="tc_amount" value="1" min="1" max="100">
        </div>

        <button type="submit" class="submit-btn">
            <span class="icon">🚀</span>Générer
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Génération en cours...</p>
        </div>
    </form>

    <!-- This would be populated by your backend -->
    {% if result %}
    <div class="result">
        <h3><span class="icon">✅</span>Résultat:</h3>
        <p>{{ result }}</p>
    </div>
    {% endif %}
</div>


</body>
</html>

{% endblock %}
